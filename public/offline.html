<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LegacyLoop — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(160deg, #0a0a0f 0%, #0d0f1a 50%, #0a0c14 100%);
      color: #f1f5f9;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', 'Segoe UI', system-ui, Helvetica, Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .container { max-width: 400px; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; color: #00bcd4; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 2rem; font-size: 0.95rem; }
    .retry-btn {
      background: linear-gradient(135deg, #22d3ee, #0097a7);
      color: #fff;
      border: none;
      padding: 0.85rem 2.5rem;
      border-radius: 0.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 188, 212, 0.35);
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }
    .retry-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 28px rgba(0, 188, 212, 0.35); }
    .retry-btn:active { transform: translateY(0); }
    .brand { margin-top: 3rem; font-size: 0.72rem; color: #475569; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>LegacyLoop needs a connection to show your items and listings. Check your Wi-Fi or cellular connection and try again.</p>
    <button class="retry-btn" onclick="window.location.reload()">Try Again</button>
    <div class="brand">LegacyLoop</div>
  </div>
</body>
</html>
